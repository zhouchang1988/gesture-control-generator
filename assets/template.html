<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{效果名称} · 手势控制</title>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="./gesture-scene.js"></script>
<script>
// ── {物体类名}类 ──
class {物体类名} {
  constructor(x, y, vx, vy) {
    this.x = x;
    this.y = y;
    // TODO: 初始化属性（大小、颜色、生命周期等）
  }

  update() {
    // TODO: 更新位置、状态（每帧调用）
  }

  draw() {
    // TODO: 使用 p5.js 函数渲染物体
  }

  isDead() {
    // TODO: 返回 true 表示物体已消失（通常检查 alpha <= 0）
    return this.alpha <= 0;
  }
}

// ── 创建场景 ──
const scene = new GestureScene({
  title: '{效果名称} · 手势控制',
  create: (x, y, vx, vy) => new {物体类名}(x, y, vx, vy),
  spawnRate: {每帧生成数量},      // 1-5，高密度效果用 3-5
  burstRate: {爆发数量},         // 3-15，鼠标按下时的生成数量
  maxObjects: {物体上限},        // 100-5000，根据效果复杂度调整
  background: [{背景色}],        // [h, s, b, a] HSB 颜色 + 透明度
  handVelocityScale: {速度缩放}, // 1.0-2.0，手势速度放大倍数
});
</script>
</body>
</html>
