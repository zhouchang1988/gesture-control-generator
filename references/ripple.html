<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水波纹 · 手势控制</title>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script src="./gesture-scene.js"></script>
<script>
// ── 波纹类 ──
class Ripple {
  constructor(x, y, vx, vy) {
    // 波纹参数
    this.radius = 0;
    this.maxRadius = 80 + Math.random() * 120;
    this.speed = 2 + Math.random() * 3;
    this.weight = 1.5 + Math.random() * 1.5;
    
    // 颜色
    this.hue = 180 + Math.random() * 40; // 蓝色系
    this.saturation = 60 + Math.random() * 40;
    this.lightness = 70 + Math.random() * 30;
    
    // 生命周期
    this.alpha = 1.0;
    this.fade = 1.0 / (this.maxRadius / this.speed); // 根据最大半径计算衰减
    
    // 波纹数量（1-3个同心圆）
    this.ringCount = Math.floor(1 + Math.random() * 3);
    this.ringSpacing = 8 + Math.random() * 7;
    
    // 创建波纹组
    this.mesh = new THREE.Group();
    this.mesh.position.set(x, y, 0);
    
    // 创建环形
    this.rings = [];
    this._createRings();
    
    // 中心亮点
    this._createCenter();
  }

  _createRings() {
    for (let i = 0; i < this.ringCount; i++) {
      const ringGeometry = new THREE.RingGeometry(0, 1, 64);
      const ringMaterial = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(this.hue / 360, this.saturation / 100, this.lightness / 100),
        transparent: true,
        opacity: this.alpha * (1 - i * 0.3),
        side: THREE.DoubleSide,
      });
      
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.scale.set(0, 0, 1); // 初始大小为0
      this.mesh.add(ring);
      this.rings.push(ring);
    }
  }

  _createCenter() {
    const centerGeometry = new THREE.CircleGeometry(3, 32);
    const centerMaterial = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(this.hue / 360, (this.saturation * 0.5) / 100, (this.lightness * 1.3) / 100),
      transparent: true,
      opacity: this.alpha * 0.5,
    });
    
    this.center = new THREE.Mesh(centerGeometry, centerMaterial);
    this.mesh.add(this.center);
  }

  update() {
    this.radius += this.speed;
    this.alpha -= this.fade;
    
    // 更新环形大小和透明度
    for (let i = 0; i < this.rings.length; i++) {
      const ring = this.rings[i];
      const ringRadius = this.radius - i * this.ringSpacing;
      
      if (ringRadius > 0) {
        ring.scale.set(ringRadius, ringRadius, 1);
        ring.material.opacity = Math.max(this.alpha * (1 - i * 0.3), 0);
      } else {
        ring.scale.set(0, 0, 1);
        ring.material.opacity = 0;
      }
    }
    
    // 更新中心亮点
    if (this.alpha > 0.3) {
      this.center.material.opacity = Math.max(this.alpha * 0.5, 0);
    } else {
      this.center.material.opacity = 0;
    }
  }

  isDead() {
    return this.alpha <= 0 || this.radius >= this.maxRadius;
  }
}

// ── 创建场景 ──
const scene = new GestureScene({
  title: '水波纹 · 手势控制',
  create: (x, y, vx, vy) => new Ripple(x, y, vx, vy),
  spawnRate: 1,
  burstRate: 3,
  maxObjects: 100,
  background: [0.08, 0.16, 0.02],
  handVelocityScale: 1.0,
  velocitySmoothing: 0.4,
});
</script>
</body>
</html>
