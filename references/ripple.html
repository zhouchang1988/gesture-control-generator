<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水波纹 · 手势控制</title>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="./gesture-scene.js"></script>
<script>
// ── 波纹类 ──
class Ripple {
  constructor(x, y, vx, vy) {
    this.x = x;
    this.y = y;
    
    // 波纹参数
    this.radius = 0;
    this.maxRadius = random(80, 200);
    this.speed = random(2, 5);
    this.weight = random(1.5, 3);
    
    // 颜色
    this.hue = random(180, 220); // 蓝色系
    this.sat = random(60, 100);
    this.bri = random(70, 100);
    
    // 生命周期
    this.alpha = 100;
    this.fade = 100 / (this.maxRadius / this.speed); // 根据最大半径计算衰减
    
    // 波纹数量（1-3个同心圆）
    this.ringCount = floor(random(1, 4));
    this.ringSpacing = random(8, 15);
  }

  update() {
    this.radius += this.speed;
    this.alpha -= this.fade;
  }

  draw() {
    const a = max(this.alpha, 0);
    noFill();
    
    for (let i = 0; i < this.ringCount; i++) {
      const r = this.radius - i * this.ringSpacing;
      if (r <= 0) continue;
      
      const ringAlpha = a * (1 - i * 0.3); // 内圈更淡
      const ringWeight = this.weight * (1 - i * 0.2); // 内圈更细
      
      stroke(this.hue, this.sat, this.bri, ringAlpha);
      strokeWeight(ringWeight);
      ellipse(this.x, this.y, r * 2);
    }
    
    // 中心亮点
    if (a > 30) {
      noStroke();
      fill(this.hue, this.sat * 0.5, this.bri * 1.3, a * 0.5);
      ellipse(this.x, this.y, 6);
    }
  }

  isDead() {
    return this.alpha <= 0 || this.radius >= this.maxRadius;
  }
}

// ── 创建场景 ──
const scene = new GestureScene({
  title: '水波纹 · 手势控制',
  create: (x, y, vx, vy) => new Ripple(x, y, vx, vy),
  spawnRate: 1,
  burstRate: 3,
  maxObjects: 100,
  background: [210, 40, 5, 20],
  handVelocityScale: 1.0,
  velocitySmoothing: 0.4,
});
</script>
</body>
</html>
